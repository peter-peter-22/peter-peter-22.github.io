<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects</title>
    <link rel="stylesheet" href="global.css">
    <script type="text/javascript" src="projects.js"></script>
    <link rel="stylesheet" href="project0.css">
    <link rel="stylesheet" href="projects.css">
    <link rel="stylesheet" href="paper_pieces.css">
</head>

<body>

    <div class="project" id="project_0">
        <div class="project0 inner" data-pages="true">

            <div class="starting">
                <div class="paper_background">
                    <div class="paper_piece" style="--type:0;background-color: var(--html);"></div>
                    <div class="paper_piece" style="--type:1;background-color: var(--javascript);"></div>
                    <div class="paper_piece" style="--type:2;background-color: var(--css);"></div>
                </div>
                <h1 class="rounded_box">Title</h1>
            </div>

            <div class="wrapper">
                <div class="sheets" id="generate_pages">

                    <div class="page sheet" data-active="false">
                        <div class="text_container">
                            <h1 class="title">title</h1>
                            <p class="text">text</p>
                        </div>
                        <div class="img_container">
                            <img src="projects/shop/top_discounts.jpg">
                        </div>
                    </div>

                    <div class="page sheet last" data-active="false">
                            <h1 class="title">Swile left</h1>
                            <div>To open</div>
                    </div>

                </div>
            </div>

            <div class="bottom_nav">
                Swipe left for the next page, and right for the previous page or to exit.
            </div>
        </div>
    </div>

    <div id="swipe_area">
    </div>

</body>

</html>
